<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스탬프 시간대별 미리보기</title>
<style>
/* ── 폰트 ── */
@font-face { font-family: 'Memoment'; font-weight: 100; src: url('/urmorning/font/MemomentKkukkukk.ttf') format('truetype'); }
@font-face { font-family: 'Memoment'; font-weight: 200; src: url('/urmorning/font/MemomentKkukkukk.ttf') format('truetype'); }
@font-face { font-family: 'Memoment'; font-weight: 300; src: url('/urmorning/font/MemomentKkukkukk.ttf') format('truetype'); }
@font-face { font-family: 'Memoment'; font-weight: 400; src: url('/urmorning/font/MemomentKkukkukk.ttf') format('truetype'); }
@font-face { font-family: 'Memoment'; font-weight: 500; src: url('/urmorning/font/MemomentKkukkukk.ttf') format('truetype'); }
@font-face { font-family: 'Memoment'; font-weight: 600; src: url('/urmorning/font/MemomentKkukkukk.ttf') format('truetype'); }
@font-face { font-family: 'Memoment'; font-weight: 700; src: url('/urmorning/font/MemomentKkukkukk.ttf') format('truetype'); }
@font-face { font-family: 'Memoment'; font-weight: 800; src: url('/urmorning/font/MemomentKkukkukk.ttf') format('truetype'); }
@font-face { font-family: 'Memoment'; font-weight: 900; src: url('/urmorning/font/MemomentKkukkukk.ttf') format('truetype'); }

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Memoment', -apple-system, sans-serif;
  background: #f0f0f0;
  padding: 20px;
}
h1 {
  text-align: center;
  font-size: 18px;
  margin-bottom: 6px;
  color: #333;
}
.subtitle {
  text-align: center;
  font-size: 12px;
  color: #888;
  margin-bottom: 20px;
}

/* ── 디버그 패널 ── */
#ctrl {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  background: rgba(20,20,20,0.95); color: #fff;
  padding: 10px 16px;
  font-family: monospace; font-size: 11px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
}
#ctrl label { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
#ctrl input[type=range] { width: 80px; }
#ctrl span { min-width: 36px; text-align: right; }
#ctrl button {
  padding: 4px 10px; border: none; border-radius: 4px;
  background: #2a7; color: #fff; cursor: pointer; font-size: 11px;
}

/* ── 그리드 ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 24px;
  margin-top: 90px; /* ctrl 높이만큼 */
}
.slot-wrap {
  background: #fff;
  border-radius: 12px;
  padding: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.slot-label {
  font-size: 12px; font-weight: 700;
  color: #444; margin-bottom: 8px; text-align: center;
}
.slot-time { font-size: 11px; color: #888; margin-bottom: 8px; text-align: center; }

/* ── 스탬프 카드 (index.html과 동일) ── */
.stamp-card {
  position: relative;
  width: 100%;
  max-width: 200px;
  margin: 0 auto;
}
.stamp-card.stamp-portrait  { aspect-ratio: 445 / 560; }
.stamp-card.stamp-landscape { aspect-ratio: 560 / 445; }
.stamp-bg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: fill; pointer-events: none; z-index: 0;
}
.stamp-inner {
  position: absolute;
  top: 4.5%; left: 4.5%; right: 4.5%; bottom: 4%;
  overflow: hidden; z-index: 1;
}
.stamp-inner::before {
  content: ''; position: absolute; inset: -2px;
  border: 1px solid rgba(0,0,0,0.18);
  pointer-events: none; z-index: 10;
}
.stamp-time-row {
  display: flex; align-items: center; justify-content: flex-start;
  position: absolute; overflow: hidden;
}
.stamp-slot { overflow: hidden; flex-shrink: 0; }
.stamp-digit {
  display: flex; align-items: center; justify-content: center;
  font-family: 'Memoment', sans-serif; font-weight: 700;
  -webkit-text-stroke: 1.5px #1a1a1a;
  paint-order: stroke fill;
  letter-spacing: -0.09em;
}
.stamp-colon {
  font-family: 'Memoment', sans-serif; font-weight: 700;
  line-height: 1; padding: 0; margin: 0 -1px;
  align-self: center;
  letter-spacing: -0.09em;
  -webkit-text-stroke: 1.5px #1a1a1a;
  paint-order: stroke fill;
}
.stamp-coating {
  position: absolute;
  height: auto;
  transform: scaleX(-1); opacity: 0.92; z-index: 3;
}
.stamp-character {
  position: absolute; height: auto; z-index: 2;
}
.stamp-ampm-wrap {
  position: absolute; top: 3%; right: 1%;
  display: flex; flex-direction: column; align-items: flex-end; gap: 2px; z-index: 4;
}
.stamp-ampm {
  font-family: 'Memoment', sans-serif; font-weight: 700;
  font-size: 10px; line-height: 1;
}

/* ── 레이아웃 클래스 ── */
.sl-0 .stamp-time-row  { top:3.5%; left:1%; }
.sl-0 .stamp-coating   { top:28%;  left:20%; width:37%; }
.sl-0 .stamp-character { top:20%;  left:-4%; width:100%; }

.sl-1 .stamp-time-row  { top:3.5%; left:1%; }
.sl-1 .stamp-coating   { top:34%;  left:6%;  width:28%; }
.sl-1 .stamp-character { top:44%;  left:-2%; width:100%; }

.sl-2 .stamp-time-row  { top:3.5%; left:1%; }
.sl-2 .stamp-coating   { top:28%;  left:8%;  width:37%; }
.sl-2 .stamp-character { top:19%;  left:14%; width:93%; }

.sl-3 .stamp-time-row  { top:3.5%; left:1%; }
.sl-3 .stamp-coating   { top:28%;  left:8%;  width:34%; }
.sl-3 .stamp-character { top:21%;  left:5%;  width:90%; }

.sl-16 .stamp-time-row  { top:3.5%; left:1%; }
.sl-16 .stamp-coating   { top:35%;  left:8%;  width:29%; }
.sl-16 .stamp-character { top:40%;  left:2%;  width:100%; }

.sl-5 .stamp-time-row  { top:3.5%; left:1%; }
.sl-5 .stamp-coating   { top:33%;  left:4%;  width:29%; }
.sl-5 .stamp-character { top:47%;  left:2%;  width:96%; }
</style>
</head>
<body>

<div id="ctrl">
  <b style="color:#7df;margin-right:4px;">🕐 시간 숫자</b>
  <label>자간
    <input type="range" id="c_ls" min="-15" max="5" step="1" value="-9" oninput="applyCtrl()">
    <span id="l_ls">-0.09em</span>
  </label>
  <label>테두리
    <input type="range" id="c_stroke" min="0" max="6" step="0.5" value="1.5" oninput="applyCtrl()">
    <span id="l_stroke">1.5px</span>
  </label>
  <label>폰트크기
    <input type="range" id="c_fs" min="14" max="60" step="1" value="28" oninput="applyCtrl()">
    <span id="l_fs">28px</span>
  </label>
  <label>굵기
    <input type="range" id="c_fw" min="100" max="900" step="100" value="700" oninput="applyCtrl()">
    <span id="l_fw">700</span>
  </label>
  <b style="color:#afd;margin-left:8px;">🚲 캐릭터</b>
  <label>width
    <input type="range" id="c_chW" min="40" max="130" step="1" value="100" oninput="applyCtrl()">
    <span id="l_chW">100%</span>
  </label>
  <b style="color:#fda;margin-left:8px;">🔵 coating</b>
  <label>width
    <input type="range" id="c_coW" min="10" max="60" step="1" value="37" oninput="applyCtrl()">
    <span id="l_coW">37%</span>
  </label>
  <button onclick="copyCSS()">📋 CSS 복사</button>
</div>

<h1>드라이브타임스탬프 — 시간대별 스탬프 미리보기</h1>
<p class="subtitle">위 슬라이더로 공통 값 조정 | 각 카드에 실시간 반영</p>

<div class="grid" id="grid"></div>

<script>
var THEMES = [
  { label:'~06:00 이전', time:'03:30', ampm:'AM', stamp:'2', sl:'sl-0', color:'#F3AD62', char:'time0', coat:'coating' },
  { label:'06:00~08:00', time:'07:15', ampm:'AM', stamp:'1', sl:'sl-1', color:'#3072BD', char:'time1', coat:'coating' },
  { label:'08:00~10:00', time:'08:45', ampm:'AM', stamp:'2', sl:'sl-2', color:'#D4382B', char:'time2', coat:'coating' },
  { label:'10:00~12:00', time:'11:20', ampm:'AM', stamp:'2', sl:'sl-3', color:'#748E52', char:'time3', coat:'coating' },
  { label:'12:00~14:00', time:'01:05', ampm:'PM', stamp:'1', sl:'sl-16',color:'#F9DEBE', char:'time4', coat:'coating' },
  { label:'14:00~16:00', time:'03:40', ampm:'PM', stamp:'1', sl:'sl-5', color:'#CAE5F4', char:'time5', coat:'coating' },
  { label:'16:00~',      time:'07:55', ampm:'PM', stamp:'1', sl:'sl-16',color:'#925BAA', char:'time6', coat:'coating' },
];

var grid = document.getElementById('grid');

THEMES.forEach(function(t, i) {
  var isLandscape = t.stamp === '1';
  var wrap = document.createElement('div');
  wrap.className = 'slot-wrap';
  wrap.innerHTML = [
    '<div class="slot-label">' + t.label + '</div>',
    '<div class="slot-time">' + t.time + ' ' + t.ampm + ' · stamp-' + t.stamp + '</div>',
    '<div class="stamp-card ' + (isLandscape ? 'stamp-landscape' : 'stamp-portrait') + ' ' + t.sl + '" data-idx="' + i + '">',
      '<img class="stamp-bg" src="/urmorning/asset/stamp-' + t.stamp + '.png" alt="">',
      '<div class="stamp-inner">',
        '<div class="stamp-time-row" id="tr_' + i + '">',
          '<div class="stamp-slot" id="s_h1_' + i + '"><span class="stamp-digit" style="color:' + t.color + ';">' + t.time[0] + '</span></div>',
          '<div class="stamp-slot" id="s_h2_' + i + '"><span class="stamp-digit" style="color:' + t.color + ';">' + t.time[1] + '</span></div>',
          '<span class="stamp-colon" style="color:' + t.color + ';">:</span>',
          '<div class="stamp-slot" id="s_m1_' + i + '"><span class="stamp-digit" style="color:' + t.color + ';">' + t.time[3] + '</span></div>',
          '<div class="stamp-slot" id="s_m2_' + i + '"><span class="stamp-digit" style="color:' + t.color + ';">' + t.time[4] + '</span></div>',
          '<div class="stamp-ampm-wrap"><div class="stamp-ampm" style="color:' + t.color + ';">' + t.ampm + '</div></div>',
        '</div>',
        '<img class="stamp-coating" id="co_' + i + '" src="/urmorning/asset/coating.png" alt="">',
        '<img class="stamp-character" id="ch_' + i + '" src="/urmorning/asset/' + t.char + '.png" alt="">',
      '</div>',
    '</div>',
  ].join('');
  grid.appendChild(wrap);
});

// 초기 적용
window.addEventListener('load', function() {
  applyCtrl();
});

function applyCtrl() {
  var ls     = parseFloat(document.getElementById('c_ls').value) / 100;
  var stroke = parseFloat(document.getElementById('c_stroke').value);
  var fs     = parseFloat(document.getElementById('c_fs').value);
  var fw     = document.getElementById('c_fw').value;
  var chW    = document.getElementById('c_chW').value;
  var coW    = document.getElementById('c_coW').value;

  document.getElementById('l_ls').textContent     = ls.toFixed(2) + 'em';
  document.getElementById('l_stroke').textContent = stroke + 'px';
  document.getElementById('l_fs').textContent     = fs + 'px';
  document.getElementById('l_fw').textContent     = fw;
  document.getElementById('l_chW').textContent    = chW + '%';
  document.getElementById('l_coW').textContent    = coW + '%';

  var tileH = Math.round(fs * 1.05);
  var tileW = Math.round(fs * 0.72);

  document.querySelectorAll('.stamp-digit, .stamp-colon').forEach(function(el) {
    el.style.fontSize         = fs + 'px';
    el.style.fontWeight       = fw;
    el.style.letterSpacing    = ls + 'em';
    el.style.webkitTextStroke = stroke + 'px #1a1a1a';
    el.style.height           = tileH + 'px';
    el.style.lineHeight       = tileH + 'px';
    el.style.minHeight        = tileH + 'px';
    el.style.width            = (el.classList.contains('stamp-colon') ? Math.round(fs*0.4) : tileW) + 'px';
    el.style.display          = 'flex';
    el.style.alignItems       = 'center';
    el.style.justifyContent   = 'center';
  });
  document.querySelectorAll('.stamp-slot').forEach(function(sl) {
    sl.style.height = tileH + 'px';
    sl.style.width  = tileW + 'px';
  });

  /* 캐릭터/coating width는 각 카드의 sl-* 클래스가 top/left 담당, width만 오버라이드 */
  THEMES.forEach(function(t, i) {
    var ch = document.getElementById('ch_' + i);
    var co = document.getElementById('co_' + i);
    /* coating width는 슬라이더 값, character width도 슬라이더 값 */
    if (ch) ch.style.width = chW + '%';
    /* coating: 테마별 width가 다르므로 공통 슬라이더는 참고용 — 개별 조정은 CSS 클래스 수정 */
    /* if (co) co.style.width = coW + '%'; */
  });
}

function copyCSS() {
  var ls     = (parseFloat(document.getElementById('c_ls').value) / 100).toFixed(2);
  var stroke = document.getElementById('c_stroke').value;
  var fs     = document.getElementById('c_fs').value;
  var fw     = document.getElementById('c_fw').value;
  var txt = '/* 자간: ' + ls + 'em / 테두리: ' + stroke + 'px / fontSize: ' + fs + 'px / weight: ' + fw + ' */';
  navigator.clipboard.writeText(txt).then(function(){ alert('복사됨!\n' + txt); }).catch(function(){ alert(txt); });
}
</script>
</body>
</html>
